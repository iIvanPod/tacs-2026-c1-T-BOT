spring.application.name=tp1c2026
# En la nube (Render) el puerto lo inyecta $PORT; en local cae a 8081.
server.port=${PORT:8081}
telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.bot.username=${TELEGRAM_BOT_USERNAME}
backend.url=${BACKEND_URL:https://tacs-backend-2026.onrender.com}
sessions.file=${SESSIONS_FILE:./sessions.json}

# Webhook (recepción de updates). URL pública de este servicio; en Render se toma solo de
# RENDER_EXTERNAL_URL. Si queda vacía, el bot arranca pero no registra webhook (no recibe mensajes).
telegram.webhook.url=${WEBHOOK_URL:${RENDER_EXTERNAL_URL:}}
telegram.webhook.path=/webhook
# Secret token que Telegram reenvía en el header X-Telegram-Bot-Api-Secret-Token (solo [A-Za-z0-9_-]).
# Si está vacío el endpoint /webhook NO se autentica: en producción seteá WEBHOOK_SECRET sí o sí.
telegram.webhook.secret=${WEBHOOK_SECRET:}

# Telegram suma campos nuevos a los updates con el tiempo: no fallar al deserializarlos.
spring.jackson.deserialization.fail-on-unknown-properties=false

# Telegram Mini App (login embebido del frontend)
tma.url=${TMA_URL:https://tacs-2026.netlify.app/login}
tma.allowed-origin=${TMA_ALLOWED_ORIGIN:https://tacs-2026.netlify.app}

# Gemini (Spring AI - Google GenAI)
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-3.1-flash-lite
spring.ai.google.genai.chat.options.temperature=0.3
