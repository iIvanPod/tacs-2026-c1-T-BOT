spring.application.name=tp1c2026
server.port=8081
# Agrego un port para futuro heath check
telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.bot.username=${TELEGRAM_BOT_USERNAME}
backend.url=${BACKEND_URL:https://tacs-backend-2026.onrender.com}
sessions.file=${SESSIONS_FILE:./sessions.json}

# Telegram Mini App (login embebido del frontend)
tma.url=${TMA_URL:https://tacs-2026.netlify.app/login}
tma.allowed-origin=${TMA_ALLOWED_ORIGIN:https://tacs-2026.netlify.app}

# Gemini (Spring AI - Google GenAI)
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-3.1-flash-lite
spring.ai.google.genai.chat.options.temperature=0.3
